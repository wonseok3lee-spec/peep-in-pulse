<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Playfair+Display:wght@400;700&family=IBM+Plex+Mono:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Peep into Pulse</title>
    <script>
      // Sync dark-mode class before paint so there's no flash on cold load.
      // useDarkMode re-runs this logic on mount and stays in sync.
      (function () {
        try {
          var saved = localStorage.getItem('pip_theme');
          var isDark =
            saved === 'dark' ||
            (saved === null &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
