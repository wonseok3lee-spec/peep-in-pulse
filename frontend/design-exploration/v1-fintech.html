<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>V1 — Modern Fintech · Peep into Pulse</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #0f172a;
        --accent: #7c3aed;
        --surface: #faf8f5;
        --card: #ffffff;
        --muted: #64748b;
        --border: #e5e7eb;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--surface);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        padding: 40px;
      }
      .logo {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--ink);
      }
      .logo .icon {
        color: var(--accent);
        display: inline-flex;
        align-items: center;
      }
      .logo .wordmark {
        font-family: "Inter", system-ui, sans-serif;
        font-weight: 900;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        line-height: 1;
      }
      .size-nav .wordmark { font-size: 16px; }
      .size-nav .icon svg { width: 48px; height: 24px; }
      .size-2x .wordmark { font-size: 32px; }
      .size-2x .icon svg { width: 96px; height: 48px; stroke-width: 2.2; }
      h2.section {
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin: 0 0 8px;
      }
      .card {
        padding: 24px;
        background: var(--card);
        border-radius: 12px;
        border: 1px solid var(--border);
      }
      .card.detail { padding: 48px; }
      .label {
        margin-top: 24px;
        color: var(--muted);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div style="max-width: 900px; margin: 0 auto;">
      <h2 class="section">Navbar size preview</h2>
      <div class="card">
        <span class="logo size-nav">
          <span class="icon" aria-hidden="true">
            <svg
              viewBox="0 0 48 24"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M2 12 L10 12 L14 4 L20 20 L26 8 L30 16 L38 12 L46 12" />
            </svg>
          </span>
          <span class="wordmark">PEEP INTO PULSE</span>
        </span>
      </div>

      <h2 class="section" style="margin-top: 32px;">2× detail</h2>
      <div class="card detail">
        <span class="logo size-2x">
          <span class="icon" aria-hidden="true">
            <svg
              viewBox="0 0 48 24"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M2 12 L10 12 L14 4 L20 20 L26 8 L30 16 L38 12 L46 12" />
            </svg>
          </span>
          <span class="wordmark">PEEP INTO PULSE</span>
        </span>
      </div>

      <p class="label">V1 — Modern Fintech · Inter 900 + pulse line</p>
    </div>
  </body>
</html>
