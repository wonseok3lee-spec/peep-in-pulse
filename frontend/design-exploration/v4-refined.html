<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>V4 — Refined Current · Peep into Pulse</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #0f172a;
        --surface: #faf8f5;
        --card: #ffffff;
        --muted: #64748b;
        --border: #e5e7eb;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--surface);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        padding: 40px;
      }
      .logo {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--ink);
        font-family: "Fraunces", Georgia, serif;
        letter-spacing: -0.01em;
        line-height: 1;
      }
      .gradient-dot {
        display: inline-block;
        border-radius: 999px;
        background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
        flex-shrink: 0;
      }
      .size-nav .gradient-dot { width: 10px; height: 10px; }
      .size-2x .gradient-dot { width: 20px; height: 20px; }
      .size-nav .wordmark { font-size: 20px; }
      .size-2x .wordmark { font-size: 40px; }
      .wordmark .ital {
        font-weight: 400;
        font-style: italic;
      }
      .wordmark .heavy {
        font-weight: 900;
        font-style: normal;
      }
      h2.section {
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin: 0 0 8px;
      }
      .card {
        padding: 24px;
        background: var(--card);
        border-radius: 12px;
        border: 1px solid var(--border);
      }
      .card.detail { padding: 48px; }
      .label {
        margin-top: 24px;
        color: var(--muted);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div style="max-width: 900px; margin: 0 auto;">
      <h2 class="section">Navbar size preview</h2>
      <div class="card">
        <span class="logo size-nav">
          <span class="gradient-dot" aria-hidden="true"></span>
          <span class="wordmark">
            <span class="ital">Peep into </span><span class="heavy">Pulse</span>
          </span>
        </span>
      </div>

      <h2 class="section" style="margin-top: 32px;">2× detail</h2>
      <div class="card detail">
        <span class="logo size-2x">
          <span class="gradient-dot" aria-hidden="true"></span>
          <span class="wordmark">
            <span class="ital">Peep into </span><span class="heavy">Pulse</span>
          </span>
        </span>
      </div>

      <p class="label">V4 — Refined Current · Fraunces editorial + gradient dot</p>
    </div>
  </body>
</html>
